# Recursive Trainer Test - Configuration Example

Example YAML configuration file for the project.
Copy and modify as needed.

data:
  symbol: "BTC/USDT"
  exchange: "binance"
  timeframe: "1h"
  start_date: "2022-01-01"
  end_date: "2024-06-21"
  data_dir: "data/historical"
  cache_enabled: true

environment:
  initial_capital: 10000.0
  initial_holdings: 0.0
  spread: 0.0005
  slippage: 0.001
  reward_scaling: 1.0
  lookback_window: 24
  max_steps_per_episode: 252
  normalize_observations: true

agent:
  agent_type: "PPO"
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  policy_net_arch: [128, 128]
  value_net_arch: [128, 128]
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  clip_range: 0.2
  buffer_size: 100000
  exploration_fraction: 0.1
  exploration_final_eps: 0.05

training:
  total_timesteps: 1000000
  n_episodes: 100
  eval_episodes: 10
  eval_freq: 10000
  save_freq: 50000
  model_dir: "models"
  log_dir: "logs"
  n_envs: 1
  seed: 42
  verbose: 1

meta_trainer:
  n_agent_configs: 5
  n_rounds: 3
  learning_rates: [0.0001, 0.0003, 0.001]
  batch_sizes: [32, 64, 128]
  keep_top_k: 3
